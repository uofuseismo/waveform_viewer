name: 🛠 Linux/MacOS CI / Build & Release Binary

on:
  push:
    branches: [ main, master, upgrade ]
    tags:    [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master, upgrade ]

permissions:
  contents: write   # allow creating/updating Releases & uploading assets
  actions:  read    # allow pulling marketplace actions

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_release_linux:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v6

      - name: 🚀 Cache pub deps
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get os dependencies
        run: sudo apt-get update -y |
             sudo apt-get upgrade -y |
             sudo apt-get install -y clang |
             sudo apt-get install -y cmake |
             sudo apt-get install -y ninja-build |
             sudo apt-get install -y pkg-config |
             sudo apt-get install -y libgtk-3-dev |
             sudo apt-get install -y libstdc++-12-dev
        
      - name: 📥 Get dependencies
        run: flutter pub get

      - name: ✅ Run tests
        run: flutter test --coverage

      - name: Build Linux
        run: flutter build linux --release

      - name: 📦 Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/linux/x64/release/bundle/waveform_viewer artifacts

      - name: Upload Ubuntu artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-ubuntu-x64
          path: artifacts

      # ─────────────── ONLY ON TAGS ───────────────
      - name: 🏷️ Create or update Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag:       ${{ github.ref_name }}
          name:      Release ${{ github.ref_name }}
          artifacts: artifacts-ubuntu/waveform_viewer
          token:     ${{ secrets.GITHUB_TOKEN }}
 
  build_and_release_macos: 
    runs-on: macos-latest

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v6

      - name: 🚀 Cache pub deps
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 📥 Get dependencies
        run: flutter pub get

      - name: ✅ Run tests
        run: flutter test --coverage

      - name: Build MacOS
        run: flutter build macos --release

      - name: 📦 Prepare artifacts
        run: |
          mkdir -p artifacts
          cp -r build/macos/Build/Products/Release/ artifacts/

      - name: Upload MacOS ARM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-macos-arm
          path: artifacts

  build_and_release_windows:
    runs-on: windows-latest

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v6

      - name: 🚀 Cache pub deps
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 📥 Get dependencies
        run: flutter pub get 

      - name: ✅ Run tests
        run: flutter test --coverage

      - name: Build Windows 
        run: flutter build windows 


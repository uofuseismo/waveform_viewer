name: 🛠 Linux/MacOS CI / Build & Release Binary

on:
  push:
    branches: [ main, master, upgrade ]
    tags:    [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master, upgrade ]

permissions:
  contents: write   # allow creating/updating Releases & uploading assets
  actions:  read    # allow pulling marketplace actions

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_release_linux:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v6

      - name: 🚀 Cache pub deps
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get os dependencies
        run: sudo apt-get update -y && sudo apt-get upgrade -y |
             sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev
        
      - name: 📥 Get dependencies
        run: flutter pub get

      - name: ✅ Run tests
        run: flutter test --coverage

      - name: Build Linux
        run: flutter build linux --release

      - name: 📦 Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/linux/x64/release/bundle/waveform_viewer artifacts/

      # ─────────────── ONLY ON TAGS ───────────────
      - name: 🏷️ Create or update Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag:       ${{ github.ref_name }}
          name:      Release ${{ github.ref_name }}
          artifacts: artifacts/waveform_viewer
          token:     ${{ secrets.GITHUB_TOKEN }}
 
  build_and_release_macos: 
    runs-on: macos-latest

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v6

      - name: 🚀 Cache pub deps
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 📥 Get dependencies
        run: flutter pub get

      - name: ✅ Run tests
        run: flutter test --coverage

      - name: Build MacOS
        run: flutter build ios --release --no-codesign

